<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1a1a1a">
    <meta name="description" content="Avoid traffic and score points! A fun car racing game.">
    <link rel="manifest" href="/Car-game/manifest.json">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%234caf50' width='192' height='192'/><text x='50%' y='50%' font-size='100' fill='%23fff' text-anchor='middle' dominant-baseline='middle'>🚗</text></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%234caf50' width='192' height='192'/><text x='50%' y='50%' font-size='100' fill='%23fff' text-anchor='middle' dominant-baseline='middle'>🚗</text></svg>">
    <title>Car Game - Drive & Survive!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            width: 100%;
            max-width: 500px;
        }

        h1 {
            font-size: 2.5rem;
            text-shadow: 0 0 10px #4caf50;
            margin: 10px 0;
        }

        .install-banner {
            background: linear-gradient(135deg, #ff9800, #fb8c00);
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            width: 100%;
            margin-bottom: 10px;
            display: none;
        }

        .install-banner.show {
            display: block;
            animation: slideDown 0.3s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .install-banner p {
            margin: 0 0 10px 0;
            font-weight: bold;
        }

        .status-bar {
            display: flex;
            justify-content: space-around;
            width: 100%;
            gap: 10px;
            flex-wrap: wrap;
        }

        .status-item {
            background: rgba(76, 175, 80, 0.2);
            padding: 10px 15px;
            border-radius: 5px;
            border: 1px solid #4caf50;
            font-size: 1.1rem;
        }

        #score {
            font-weight: bold;
            color: #4caf50;
        }

        #level {
            font-weight: bold;
            color: #4caf50;
        }

        #game-canvas {
            border: 4px solid #4caf50;
            background-color: #111111;
            box-shadow: 0 0 20px rgba(76, 175, 80, 0.5);
            width: 100%;
            max-width: 400px;
            height: auto;
            aspect-ratio: 1;
            display: block;
        }

        .button-group {
            display: flex;
            gap: 10px;
            width: 100%;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 24px;
            font-size: 1rem;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        #start-btn {
            background-color: #4caf50;
            color: white;
            min-width: 120px;
        }

        #start-btn:hover:not(:disabled) {
            background-color: #45a049;
            box-shadow: 0 0 15px rgba(76, 175, 80, 0.7);
        }

        #start-btn:disabled {
            opacity: 0.7;
        }

        #pause-btn {
            background-color: #2196F3;
            color: white;
            min-width: 120px;
        }

        #pause-btn:hover:not(:disabled) {
            background-color: #0b7dda;
            box-shadow: 0 0 15px rgba(33, 150, 243, 0.7);
        }

        #pause-btn:disabled {
            opacity: 0.7;
        }

        #install-btn {
            background-color: #ff9800;
            color: white;
            min-width: 120px;
        }

        #install-btn:hover {
            background-color: #fb8c00;
            box-shadow: 0 0 15px rgba(255, 152, 0, 0.7);
        }

        #install-btn.hidden {
            display: none;
        }

        .controls {
            text-align: center;
            color: #aaa;
            font-size: 0.9rem;
            margin-top: 10px;
        }

        .game-info {
            text-align: center;
            color: #aaa;
            font-size: 0.85rem;
            margin-top: 10px;
        }

        #game-over-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        #game-over-modal.show {
            display: flex;
        }

        .modal-content {
            background-color: #2a2a2a;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            border: 2px solid #4caf50;
            box-shadow: 0 0 20px rgba(76, 175, 80, 0.5);
        }

        .modal-content h2 {
            font-size: 2rem;
            margin-bottom: 15px;
            color: #ff6b6b;
        }

        .modal-content p {
            font-size: 1.3rem;
            margin: 10px 0;
        }

        .modal-content .final-score {
            color: #4caf50;
            font-weight: bold;
            font-size: 1.5rem;
            margin: 15px 0;
        }

        .modal-content button {
            margin-top: 20px;
            padding: 15px 30px;
            font-size: 1.1rem;
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 2rem;
            }

            .status-item {
                font-size: 0.95rem;
                padding: 8px 12px;
            }

            button {
                padding: 10px 20px;
                font-size: 0.95rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚗 Car Game</h1>

        <div class="install-banner" id="install-banner">
            <p>📱 Install this game on your device!</p>
            <button id="install-btn">📲 Install App</button>
        </div>

        <div class="status-bar">
            <div class="status-item">Score: <span id="score">0</span></div>
            <div class="status-item">Level: <span id="level">1</span></div>
            <div class="status-item">Best: <span id="best-score">0</span></div>
        </div>

        <canvas id="game-canvas" width="400" height="400"></canvas>

        <div class="button-group">
            <button id="start-btn">▶ Start Game</button>
            <button id="pause-btn" disabled>⏸ Pause</button>
        </div>

        <div class="controls">
            <p>⬅️ ⬆️ ⬇️ ➡️ Arrow Keys or WASD to move</p>
            <p>🎯 Avoid Red Traffic | 💚 You are Green</p>
        </div>

        <div class="game-info">
            <p>Each car you avoid = +10 points</p>
            <p>Difficulty increases with level!</p>
        </div>
    </div>

    <div id="game-over-modal">
        <div class="modal-content">
            <h2>Game Over!</h2>
            <p id="game-over-reason"></p>
            <div class="final-score">
                Score: <span id="final-score">0</span>
            </div>
            <p id="best-beat" style="color: #4caf50; font-weight: bold;"></p>
            <button id="restart-btn">🔄 Play Again</button>
        </div>
    </div>

    <script src="/Car-game/service-worker-register.js"></script>
    <script>
        const canvas = document.getElementById("game-canvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");
        const levelElement = document.getElementById("level");
        const bestScoreElement = document.getElementById("best-score");
        const startBtn = document.getElementById("start-btn");
        const pauseBtn = document.getElementById("pause-btn");
        const gameOverModal = document.getElementById("game-over-modal");
        const restartBtn = document.getElementById("restart-btn");
        const installBanner = document.getElementById("install-banner");
        const installBtn = document.getElementById("install-btn");

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let car = [{ x: 10, y: 10 }];
        let traffic = [];
        let dx = 0;
        let dy = 0;
        let nextDx = 0;
        let nextDy = 0;
        let score = 0;
        let level = 1;
        let bestScore = localStorage.getItem("carGameBestScore") || 0;
        let gameRunning = false;
        let gamePaused = false;
        let gameInterval;
        let gameSpeed = 100;
        let trafficSpeed = 30;
        let trafficSpeedCounter = 0;
        let deferredPrompt;

        bestScoreElement.textContent = bestScore;

        // PWA Install Event
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBanner.classList.add('show');
        });

        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                console.log(`User response: ${outcome}`);
                deferredPrompt = null;
                installBanner.classList.remove('show');
            }
        });

        window.addEventListener('appinstalled', () => {
            console.log('App installed!');
            installBanner.classList.remove('show');
        });

        document.addEventListener("keydown", changeDirection);

        startBtn.addEventListener("click", () => {
            if (!gameRunning) {
                startGame();
            }
        });

        pauseBtn.addEventListener("click", () => {
            if (gameRunning) {
                gamePaused = !gamePaused;
                pauseBtn.textContent = gamePaused ? "▶ Resume" : "⏸ Pause";
            }
        });

        restartBtn.addEventListener("click", () => {
            gameOverModal.classList.remove("show");
            startGame();
        });

        function startGame() {
            car = [{ x: 10, y: 10 }];
            traffic = [];
            dx = 0;
            dy = 0;
            nextDx = 0;
            nextDy = 0;
            score = 0;
            level = 1;
            gameRunning = true;
            gamePaused = false;
            gameSpeed = 100;
            trafficSpeed = 30;
            trafficSpeedCounter = 0;

            scoreElement.textContent = score;
            levelElement.textContent = level;
            startBtn.disabled = true;
            pauseBtn.disabled = false;
            pauseBtn.textContent = "⏸ Pause";

            generateTraffic();
            gameLoop();
        }

        function gameLoop() {
            if (!gamePaused) {
                update();
            }
            draw();

            if (gameRunning) {
                gameInterval = setTimeout(gameLoop, gameSpeed);
            }
        }

        function update() {
            if (!gameRunning) return;

            dx = nextDx;
            dy = nextDy;

            const head = { x: car[0].x + dx, y: car[0].y + dy };

            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                endGame("You hit the wall!");
                return;
            }

            if (car.some((part, i) => i > 0 && part.x === head.x && part.y === head.y)) {
                endGame("You hit yourself!");
                return;
            }

            car.unshift(head);
            car.pop();

            trafficSpeedCounter++;
            if (trafficSpeedCounter >= trafficSpeed) {
                trafficSpeedCounter = 0;
                traffic.forEach((t) => {
                    t.y += 1;
                });
                traffic = traffic.filter((t) => t.y < tileCount);

                traffic.forEach((t) => {
                    if (car[0].x === t.x && car[0].y === t.y) {
                        endGame("You crashed into traffic!");
                    }
                });

                if (Math.random() < 0.3) {
                    generateTraffic();
                }

                score += 10;
                scoreElement.textContent = score;

                if (score % 100 === 0 && score > 0) {
                    level = Math.floor(score / 100) + 1;
                    levelElement.textContent = level;
                    gameSpeed = Math.max(50, 100 - level * 5);
                    trafficSpeed = Math.max(10, 30 - level * 2);
                }
            }
        }

        function draw() {
            ctx.fillStyle = "#111111";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.strokeStyle = "#222222";
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }

            car.forEach((part, index) => {
                ctx.fillStyle = index === 0 ? "#81c784" : "#4caf50";
                ctx.fillRect(
                    part.x * gridSize + 2,
                    part.y * gridSize + 2,
                    gridSize - 4,
                    gridSize - 4
                );
            });

            traffic.forEach((t) => {
                ctx.fillStyle = "#f44336";
                ctx.fillRect(
                    t.x * gridSize + 2,
                    t.y * gridSize + 2,
                    gridSize - 4,
                    gridSize - 4
                );
            });

            if (gamePaused) {
                ctx.fillStyle = "rgba(0, 0, 0, 0.5)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#ffffff";
                ctx.font = "30px Arial";
                ctx.textAlign = "center";
                ctx.fillText("PAUSED", canvas.width / 2, canvas.height / 2);
            }
        }

        function changeDirection(event) {
            const key = event.key.toLowerCase();

            switch (key) {
                case "arrowleft":
                case "a":
                    if (dx === 0) {
                        nextDx = -1;
                        nextDy = 0;
                    }
                    event.preventDefault();
                    break;
                case "arrowup":
                case "w":
                    if (dy === 0) {
                        nextDx = 0;
                        nextDy = -1;
                    }
                    event.preventDefault();
                    break;
                case "arrowright":
                case "d":
                    if (dx === 0) {
                        nextDx = 1;
                        nextDy = 0;
                    }
                    event.preventDefault();
                    break;
                case "arrowdown":
                case "s":
                    if (dy === 0) {
                        nextDx = 0;
                        nextDy = 1;
                    }
                    event.preventDefault();
                    break;
                case " ":
                    pauseBtn.click();
                    event.preventDefault();
                    break;
            }
        }

        function generateTraffic() {
            const x = Math.floor(Math.random() * tileCount);
            traffic.push({ x: x, y: -1 });
        }

        function endGame(reason) {
            gameRunning = false;
            clearTimeout(gameInterval);

            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem("carGameBestScore", bestScore);
                bestScoreElement.textContent = bestScore;
            }

            document.getElementById("game-over-reason").textContent = reason;
            document.getElementById("final-score").textContent = score;

            const beatMessage = score > parseInt(localStorage.getItem("carGamePrevScore") || 0) 
                ? "🎉 New Personal Best!" 
                : "";
            document.getElementById("best-beat").textContent = beatMessage;

            localStorage.setItem("carGamePrevScore", score);

            gameOverModal.classList.add("show");

            startBtn.disabled = false;
            pauseBtn.disabled = true;
        }

        bestScoreElement.textContent = bestScore;
        draw();
    </script>
</body>
</html>
