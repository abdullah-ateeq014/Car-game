<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#1a1a1a">
    <meta name="description" content="A fun car racing game. Avoid traffic and score points!">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%234caf50' width='192' height='192'/><text x='50%' y='50%' font-size='100' fill='%23fff' text-anchor='middle' dominant-baseline='middle'>🚗</text></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%234caf50' width='192' height='192'/><text x='50%' y='50%' font-size='100' fill='%23fff' text-anchor='middle' dominant-baseline='middle'>🚗</text></svg>">
    <title>Car Game - Drive & Survive!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            width: 100%;
            max-width: 500px;
        }

        h1 {
            font-size: 2.5rem;
            text-shadow: 0 0 10px #4caf50;
            margin: 10px 0;
        }

        .status-bar {
            display: flex;
            justify-content: space-around;
            width: 100%;
            gap: 10px;
            flex-wrap: wrap;
        }

        .status-item {
            background: rgba(76, 175, 80, 0.2);
            padding: 10px 15px;
            border-radius: 5px;
            border: 1px solid #4caf50;
            font-size: 1.1rem;
        }

        #score {
            font-weight: bold;
            color: #4caf50;
        }

        #level {
            font-weight: bold;
            color: #4caf50;
        }

        #game-canvas {
            border: 4px solid #824caf;
            background-color: #111111;
            box-shadow: 0 0 20px rgba(76, 175, 80, 0.5);
            width: 100%;
            max-width: 400px;
            height: auto;
            aspect-ratio: 1;
            display: block;
        }

        .button-group {
            display: flex;
            gap: 10px;
            width: 100%;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 24px;
            font-size: 1rem;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        #start-btn {
            background-color: #4caf50;
            color: white;
            min-width: 120px;
        }

        #start-btn:hover:not(:disabled) {
            background-color: #45a049;
            box-shadow: 0 0 15px rgba(76, 175, 80, 0.7);
        }

        #start-btn:disabled {
            opacity: 0.7;
        }

        #pause-btn {
            background-color: #2196F3;
            color: white;
            min-width: 120px;
        }

        #pause-btn:hover:not(:disabled) {
            background-color: #0b7dda;
            box-shadow: 0 0 15px rgba(33, 150, 243, 0.7);
        }

        #pause-btn:disabled {
            opacity: 0.7;
        }

        #install-btn {
            background-color: #ff9800;
            color: white;
            min-width: 120px;
        }

        #install-btn:hover {
            background-color: #fb8c00;
            box-shadow: 0 0 15px rgba(255, 152, 0, 0.7);
        }

        #install-btn.hidden {
            display: none;
        }

        .controls {
            text-align: center;
            color: #aaa;
            font-size: 0.9rem;
            margin-top: 10px;
        }

        .game-info {
            text-align: center;
            color: #aaa;
            font-size: 0.85rem;
            margin-top: 10px;
        }

        #game-over-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        #game-over-modal.show {
            display: flex;
        }

        .modal-content {
            background-color: #2a2a2a;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            border: 2px solid #4caf50;
            box-shadow: 0 0 20px rgba(76, 175, 80, 0.5);
        }

        .modal-content h2 {
            font-size: 2rem;
            margin-bottom: 15px;
            color: #ff6b6b;
        }

        .modal-content p {
            font-size: 1.3rem;
            margin: 10px 0;
        }

        .modal-content .final-score {
            color: #4caf50;
            font-weight: bold;
            font-size: 1.5rem;
            margin: 15px 0;
        }

        .modal-content button {
            margin-top: 20px;
            padding: 15px 30px;
            font-size: 1.1rem;
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 2rem;
            }

            .status-item {
                font-size: 0.95rem;
                padding: 8px 12px;
            }

            button {
                padding: 10px 20px;
                font-size: 0.95rem;
            }
        }

        .install-prompt {
            background: rgba(255, 152, 0, 0.2);
            border: 1px solid #ff9800;
            border-radius: 5px;
            padding: 10px;
            font-size: 0.9rem;
            color: #ffa726;
            text-align: center;
            margin-bottom: 10px;
        }

        .install-prompt.hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚗 Car Game</h1>
        
        <div class="install-prompt hidden" id="install-prompt">
            📱 Install this app to play offline!
        </div>

        <div class="status-bar">
            <div class="status-item">Score: <span id="score">0</span></div>
            <div class="status-item">Level: <span id="level">1</span></div>
            <div class="status-item">Best: <span id="best-score">0</span></div>
        </div>

        <canvas id="game-canvas" width="400" height="400"></canvas>

        <div class="button-group">
            <button id="start-btn">▶ Start Game</button>
            <button id="pause-btn" disabled>⏸ Pause</button>
            <button id="install-btn" class="hidden">📲 Install App</button>
        </div>

        <div class="controls">
            <p>⬅️ ⬆️ ⬇️ ➡️ Arrow Keys or WASD to move</p>
            <p>🎯 Avoid Traffic | 💯 Collect Green Squares</p>
        </div>

        <div class="game-info">
            <p>Each traffic car you avoid = +10 points</p>
            <p>Difficulty increases with level!</p>
        </div>
    </div>

    <div id="game-over-modal">
        <div class="modal-content">
            <h2>Game Over!</h2>
            <p id="game-over-reason"></p>
            <div class="final-score">
                Score: <span id="final-score">0</span>
            </div>
            <p id="best-beat" style="color: #4caf50; font-weight: bold;"></p>
            <button id="restart-btn">🔄 Play Again</button>
        </div>
    </div>

    <script src="service-worker-register.js"></script>
    <script src="game.js"></script>
</body>
</html>
